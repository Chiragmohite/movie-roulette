<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Roulette — 3D Vault</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;height:100vh;width:100vw}
#cv{display:block;width:100vw;height:100vh}

#ui{position:fixed;bottom:0;left:0;right:0;padding:14px 24px 20px;background:linear-gradient(transparent,rgba(5,5,10,0.95) 35%);z-index:10}

/* filter bars */
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.f-btn{padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.55);font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.15s;white-space:nowrap}
.f-btn:hover{background:rgba(255,255,255,0.12);color:#fff}
.f-btn.on{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.5);color:#fff}
.f-btn.lang.on{background:rgba(255,200,80,0.16);border-color:rgba(255,200,80,0.45);color:rgba(255,200,80,1)}
.f-btn.decade.on{background:rgba(100,200,255,0.14);border-color:rgba(100,200,255,0.4);color:rgba(100,200,255,1)}

/* bottom controls */
#now-playing{margin-bottom:8px}
#movie-title{font-size:22px;font-weight:600;color:#fff;letter-spacing:-0.3px;min-height:28px;text-shadow:0 2px 12px rgba(0,0,0,0.8)}
#movie-meta{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px}

#controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#spin-btn{padding:9px 26px;border-radius:9px;background:#fff;color:#0a0a0f;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.15s,transform 0.1s}
#spin-btn:hover{opacity:0.88}
#spin-btn:active{transform:scale(0.97)}
#spin-btn:disabled{opacity:0.35;cursor:not-allowed}
#skip-btn{padding:9px 18px;border-radius:9px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s;display:none}
#skip-btn:hover{background:rgba(255,255,255,0.12);color:#fff}
#watchlist-btn{padding:9px 16px;border-radius:9px;border:1px solid rgba(255,255,255,0.16);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.15s}
#watchlist-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
#count-lbl{font-size:11px;color:rgba(255,255,255,0.25)}
#rating-wrap{display:flex;align-items:center;gap:7px;margin-left:auto}
#rating-wrap label{font-size:11px;color:rgba(255,255,255,0.35)}
#rslider{width:80px;accent-color:#fff;cursor:pointer}
#rval{font-size:11px;color:rgba(255,255,255,0.7);min-width:24px}

/* ── banner ── */
#backdrop{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0);transition:background 0.4s ease;cursor:pointer}
#backdrop.open{display:block;background:rgba(0,0,0,0.7)}
#banner{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.88);z-index:100;width:min(700px,94vw);border-radius:18px;overflow:hidden;opacity:0;transition:opacity 0.3s ease,transform 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 32px 80px rgba(0,0,0,0.85),0 0 0 1px rgba(255,255,255,0.1)}
#banner.open{display:block;opacity:1;transform:translate(-50%,-50%) scale(1)}
#banner-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(28px) brightness(0.3);transform:scale(1.1)}
#banner-inner{position:relative;z-index:1;padding:24px;background:linear-gradient(135deg,rgba(10,10,20,0.75),rgba(5,5,12,0.88))}
#banner-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;z-index:2}
#banner-close:hover{background:rgba(255,255,255,0.2);color:#fff}

/* banner top: poster + info side by side */
#banner-top{display:flex;gap:20px;margin-bottom:16px}
#banner-poster{width:120px;height:180px;border-radius:10px;object-fit:cover;flex-shrink:0;box-shadow:0 8px 32px rgba(0,0,0,0.6);background:rgba(255,255,255,0.05)}
#banner-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
#banner-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,200,80,0.8);margin-bottom:6px}
#banner-title{font-size:24px;font-weight:700;color:#fff;line-height:1.2;letter-spacing:-0.4px}
#banner-meta{font-size:12px;color:rgba(255,255,255,0.4);margin-top:5px}
#banner-stars{display:flex;align-items:center;gap:3px;margin-top:6px}
.star{font-size:13px;color:rgba(255,200,80,0.85)}
#banner-vote{font-size:11px;color:rgba(255,255,255,0.3);margin-left:4px}
#banner-overview{font-size:12px;color:rgba(255,255,255,0.6);margin-top:10px;line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* trailer embed */
#trailer-wrap{display:none;margin-top:14px;border-radius:10px;overflow:hidden;aspect-ratio:16/9;background:#000}
#trailer-wrap iframe{width:100%;height:100%;border:none}

/* banner buttons */
#banner-btns{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
.bb{padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s}
.bb:hover{background:rgba(255,255,255,0.16);color:#fff;border-color:rgba(255,255,255,0.38)}
.bb.hi{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.45);color:#fff}
.bb.wl{background:rgba(255,100,100,0.12);border-color:rgba(255,100,100,0.3);color:rgba(255,150,150,1)}
.bb.wl.saved{background:rgba(255,100,100,0.25);border-color:rgba(255,100,100,0.6);color:#fff}
.bb.trailer-toggle{background:rgba(80,180,255,0.1);border-color:rgba(80,180,255,0.3);color:rgba(120,200,255,1)}

/* watchlist panel */
#wl-backdrop{display:none;position:fixed;inset:0;z-index:149;background:rgba(0,0,0,0.6)}
#wl-backdrop.open{display:block}
#wl-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);z-index:150;width:min(500px,92vw);max-height:70vh;border-radius:16px;background:rgba(8,8,16,0.97);border:1px solid rgba(255,255,255,0.1);box-shadow:0 24px 60px rgba(0,0,0,0.8);overflow:hidden;flex-direction:column;opacity:0;transition:opacity 0.25s,transform 0.25s cubic-bezier(0.34,1.56,0.64,1)}
#wl-panel.open{display:flex;opacity:1;transform:translate(-50%,-50%) scale(1)}
#wl-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.07)}
#wl-header h3{font-size:16px;font-weight:600;color:#fff}
#wl-close{background:none;border:none;color:rgba(255,255,255,0.5);font-size:18px;cursor:pointer;padding:4px}
#wl-close:hover{color:#fff}
#wl-list{overflow-y:auto;flex:1;padding:12px 16px}
#wl-list::-webkit-scrollbar{width:4px}
#wl-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.wl-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.wl-item:last-child{border-bottom:none}
.wl-thumb{width:40px;height:60px;border-radius:5px;object-fit:cover;background:rgba(255,255,255,0.05);flex-shrink:0}
.wl-info{flex:1;min-width:0}
.wl-name{font-size:13px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-year{font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px}
.wl-remove{background:none;border:none;color:rgba(255,100,100,0.6);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0}
.wl-remove:hover{color:rgba(255,100,100,1)}
#wl-empty{text-align:center;padding:32px;font-size:13px;color:rgba(255,255,255,0.3)}

#hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.2);pointer-events:none;letter-spacing:0.5px}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hint">drag to spin · click to explore</div>

<!-- banner -->
<div id="backdrop" onclick="closeBanner()"></div>
<div id="banner">
  <div id="banner-bg"></div>
  <button id="banner-close" onclick="closeBanner()">✕</button>
  <div id="banner-inner">
    <div id="banner-top">
      <img id="banner-poster" alt="">
      <div id="banner-info">
        <div id="banner-tag">Tonight's Pick</div>

    <div id="trailer-wrap"><iframe id="trailer-frame" allowfullscreen allow="autoplay"></iframe></div>

      <button class="bb" id="bb-skip" onclick="closeBanner();skipMovie()">Not this one</button>

<!-- main UI -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const API_KEY = "db76c689c142949499b276e42606539a";

// ── filters ──────────────────────────────────────────────────────────────────
let selectedGenre = "", selectedLang = "", selectedFrom = "", selectedTo = "";

document.querySelectorAll("#genre-bar .f-btn").forEach(b => {
  b.onclick = () => { document.querySelectorAll("#genre-bar .f-btn").forEach(x=>x.classList.remove("on")); b.classList.add("on"); selectedGenre=b.dataset.id; };
});
document.querySelectorAll("#lang-bar .f-btn").forEach(b => {
  b.onclick = () => { document.querySelectorAll("#lang-bar .f-btn").forEach(x=>x.classList.remove("on")); b.classList.add("on"); selectedLang=b.dataset.lang; };
});
document.querySelectorAll("#decade-bar .f-btn").forEach(b => {
  b.onclick = () => { document.querySelectorAll("#decade-bar .f-btn").forEach(x=>x.classList.remove("on")); b.classList.add("on"); selectedFrom=b.dataset.from; selectedTo=b.dataset.to; };
});

const rslider = document.getElementById("rslider");
const rvalEl  = document.getElementById("rval");
rslider.oninput = () => rvalEl.textContent = parseFloat(rslider.value).toFixed(1);

// ── Three.js ──────────────────────────────────────────────────────────────────
const canvas   = document.getElementById("cv");
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x0a0a0f,1);
renderer.shadowMap.enabled = true;

const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0x0a0a0f, 0.028);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 300);
camera.position.set(0, 2.5, 13);
camera.lookAt(0,0,0);

window.addEventListener("resize", () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
renderer.setSize(innerWidth, innerHeight);

scene.add(new THREE.AmbientLight(0xffffff, 0.25));
const keyLight = new THREE.PointLight(0x6688ff, 3, 35); keyLight.position.set(-6,10,6); scene.add(keyLight);
const rimLight = new THREE.PointLight(0xff5533, 2, 28); rimLight.position.set(6,6,-8); scene.add(rimLight);
const fillLight = new THREE.PointLight(0x88ffcc, 1, 20); fillLight.position.set(0,-4,10); scene.add(fillLight);
const dirLight = new THREE.DirectionalLight(0xffffff,0.6);
dirLight.position.set(0,12,5);
scene.add(dirLight);

const floor = new THREE.Mesh(new THREE.PlaneGeometry(80,80), new THREE.MeshStandardMaterial({color:0x06060c,roughness:0.3,metalness:0.7}));
floor.rotation.x=-Math.PI/2; floor.position.y=-1.06; scene.add(floor);

const PALETTES=[["#1a0a2e","#4a1080"],["#0a1a2e","#1050a0"],["#2e0a0a","#a03010"],["#0a2e1a","#10a050"],["#2e2a0a","#a09010"],["#1a1a2e","#5050c0"],["#2e0a1a","#a01050"],["#0a2e2e","#10a0a0"],["#1e0a0e","#803040"]];

function makeCardTex(p){
  const c=document.createElement("canvas"); c.width=256; c.height=384;
  const ctx=c.getContext("2d");
  const g=ctx.createLinearGradient(0,0,256,384); g.addColorStop(0,p[0]); g.addColorStop(1,p[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,256,384);
  ctx.fillStyle="rgba(0,0,0,0.5)"; for(let i=0;i<8;i++) ctx.fillRect(8+i*30,8,18,14);
  ctx.fillStyle="rgba(255,255,255,0.03)"; for(let y=0;y<384;y+=4) ctx.fillRect(0,y,256,2);
  ctx.strokeStyle="rgba(255,255,255,0.12)"; ctx.lineWidth=1; ctx.strokeRect(20,36,216,280);
  ctx.beginPath(); ctx.moveTo(20,36); ctx.lineTo(236,316); ctx.moveTo(236,36); ctx.lineTo(20,316); ctx.stroke();
  ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(0,330,256,54);
  return new THREE.CanvasTexture(c);
}

const TOTAL=48, RADIUS=8, cards=[];
for(let i=0;i<TOTAL;i++){
  const a=(i/TOTAL)*Math.PI*2, p=PALETTES[i%PALETTES.length];
  const mats=[
    new THREE.MeshStandardMaterial({color:0x1a1a28,roughness:0.7,metalness:0.5}),
    new THREE.MeshStandardMaterial({color:0x1a1a28,roughness:0.7,metalness:0.5}),
    new THREE.MeshStandardMaterial({color:0x1a1a28,roughness:0.7,metalness:0.5}),
    new THREE.MeshStandardMaterial({color:0x1a1a28,roughness:0.7,metalness:0.5}),
    new THREE.MeshStandardMaterial({map:makeCardTex(p),roughness:0.45,metalness:0.25}),
    new THREE.MeshStandardMaterial({color:0x0d0d18,roughness:0.9,metalness:0.1}),
  ];
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(1.5,2.25,0.07),mats);
  mesh.position.set(Math.cos(a)*RADIUS,0,Math.sin(a)*RADIUS);
  mesh.rotation.y=-a+Math.PI/2;
  mesh.userData={baseAngle:a};
  scene.add(mesh); cards.push(mesh);
}

const pGeo=new THREE.BufferGeometry(), pPos=new Float32Array(300*3);
for(let i=0;i<300;i++){pPos[i*3]=(Math.random()-0.5)*40;pPos[i*3+1]=(Math.random()-0.5)*20;pPos[i*3+2]=(Math.random()-0.5)*40;}
pGeo.setAttribute("position",new THREE.BufferAttribute(pPos,3));
scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x8888cc,size:0.06,transparent:true,opacity:0.5})));

let rotY=0, autoSpin=true, isDragging=false, lastX=0, velocity=0, highlighted=-1;
canvas.addEventListener("mousedown",e=>{isDragging=true;lastX=e.clientX;autoSpin=false;velocity=0;});
window.addEventListener("mouseup",()=>{isDragging=false;});
window.addEventListener("mousemove",e=>{if(!isDragging)return;const dx=e.clientX-lastX;velocity=dx*0.002;rotY+=dx*0.003;lastX=e.clientX;});
canvas.addEventListener("touchstart",e=>{isDragging=true;lastX=e.touches[0].clientX;autoSpin=false;},{passive:true});
window.addEventListener("touchend",()=>{isDragging=false;});
window.addEventListener("touchmove",e=>{if(!isDragging)return;const dx=e.touches[0].clientX-lastX;velocity=dx*0.002;rotY+=dx*0.003;lastX=e.touches[0].clientX;},{passive:true});

let spinAnim=false, spinStart=0, spinTarget=0, spinStartTime=0;
const SPIN_DUR=2600;
function easeInOutQuint(t){return t<0.5?16*t*t*t*t*t:1-Math.pow(-2*t+2,5)/2;}

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  if(spinAnim){
    const p=Math.min((now-spinStartTime)/SPIN_DUR,1);
    rotY=spinStart+easeInOutQuint(p)*(spinTarget-spinStart);
    if(p>=1) spinAnim=false;
  } else if(autoSpin){
    rotY+=0.004;
  } else if(!isDragging && Math.abs(velocity)>0.0004){
    rotY+=velocity; velocity*=0.94;
  }
  cards.forEach((card,i)=>{
    const a=card.userData.baseAngle+rotY;
    card.position.x=Math.cos(a)*RADIUS; card.position.z=Math.sin(a)*RADIUS; card.rotation.y=-a+Math.PI/2;
    const isHigh=i===highlighted;
    card.position.y+=(( isHigh?0.5:0)-card.position.y)*0.1;
    card.scale.setScalar(card.scale.x+((isHigh?1.1:1)-card.scale.x)*0.1);
    card.material[4].emissiveIntensity=isHigh?(card.material[4].emissive=new THREE.Color(0x553311),0.45):0;
  });
  keyLight.position.x=Math.sin(now*0.0007)*8;
  rimLight.position.z=Math.cos(now*0.0005)*8-6;
  fillLight.position.x=Math.sin(now*0.0011)*5;
  renderer.render(scene,camera);
}
animate();

// ── fetch ─────────────────────────────────────────────────────────────────────
let isFetching=false, currentMovie=null, currentId=null, currentTitle="";
let lastResults=[], lastResultIdx=0;

async function fetchMovies(){
  const page=Math.floor(Math.random()*12)+1;
  let rating=parseFloat(rslider.value);

  async function tryFetch(r){
    let url=`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&vote_count.gte=50&vote_average.gte=${r}&page=${page}&language=en-US`;
    if(selectedGenre) url+=`&with_genres=${selectedGenre}`;
    if(selectedLang)  url+=`&with_original_language=${selectedLang}`;
    if(selectedFrom)  url+=`&primary_release_date.gte=${selectedFrom}-01-01`;
    if(selectedTo)    url+=`&primary_release_date.lte=${selectedTo}-12-31`;
    const res=await fetch(url); return await res.json();
  }

  let d=await tryFetch(rating);
  while((!d.results||d.results.length===0)&&rating>5){ rating=Math.max(rating-1,5); d=await tryFetch(rating); }

  if(!d.results||d.results.length===0) return null;
  const label=rating<parseFloat(rslider.value)?`No results at that rating — showing ${rating}+`:`${(d.total_results||0).toLocaleString()} movies`;
  document.getElementById("count-lbl").textContent=label;
  lastResults=d.results;
  lastResultIdx=Math.floor(Math.random()*lastResults.length);
  return lastResults[lastResultIdx];
}

async function spin(){
  if(isFetching) return;
  isFetching=true;
  closeBanner();
  document.getElementById("spin-btn").disabled=true;
  document.getElementById("skip-btn").style.display="none";
  document.getElementById("movie-title").textContent="Spinning…";
  document.getElementById("movie-meta").textContent="";
  highlighted=-1;

  const movie=await fetchMovies().catch(()=>null);
  currentMovie=movie;

  const chosenIdx=Math.floor(Math.random()*TOTAL);
  spinStart=rotY; spinTarget=rotY+Math.PI*2*5-((rotY)%(Math.PI*2));
  spinStartTime=performance.now(); spinAnim=true; autoSpin=false;

  setTimeout(()=>{
    highlighted=chosenIdx;
    if(movie){
      const year=movie.release_date?movie.release_date.slice(0,4):"";
      document.getElementById("movie-title").textContent=movie.title;
      document.getElementById("movie-meta").textContent=(year||"")+(movie.vote_average?" · ★ "+movie.vote_average.toFixed(1):"");
      document.getElementById("skip-btn").style.display="inline-flex";
      showBanner(movie);
    } else {
      document.getElementById("movie-title").textContent="No movies found — try changing filters";
    }
    isFetching=false;
    document.getElementById("spin-btn").disabled=false;
  }, SPIN_DUR+100);
}

async function skipMovie(){
  if(isFetching) return;
  closeBanner();
  // try next in last results first (no extra API call)
  if(lastResults.length>1){
    lastResultIdx=(lastResultIdx+1)%lastResults.length;
    const movie=lastResults[lastResultIdx];
    currentMovie=movie;
    const year=movie.release_date?movie.release_date.slice(0,4):"";
    document.getElementById("movie-title").textContent=movie.title;
    document.getElementById("movie-meta").textContent=(year||"")+(movie.vote_average?" · ★ "+movie.vote_average.toFixed(1):"");
    setTimeout(()=>showBanner(movie),200);
  } else {
    spin();
  }
}

// ── banner ────────────────────────────────────────────────────────────────────
let trailerOpen=false;

function showBanner(movie){
  const year=movie.release_date?movie.release_date.slice(0,4):"";
  currentId=movie.id; currentTitle=movie.title;
  document.getElementById("banner-title").textContent=movie.title;
  document.getElementById("banner-overview").textContent=movie.overview||"";
  document.getElementById("banner-meta").textContent=[year, movie.vote_average?"★ "+movie.vote_average.toFixed(1):null].filter(Boolean).join("  ·  ");

  const starsEl=document.getElementById("banner-stars");
  if(movie.vote_average){
    const filled=Math.round(movie.vote_average/2);
    starsEl.innerHTML=Array.from({length:5},(_,i)=>`<span class="star">${i<filled?"★":"☆"}</span>`).join("")+`<span id="banner-vote">${movie.vote_count?movie.vote_count.toLocaleString()+" votes":""}</span>`;
  } else starsEl.innerHTML="";

  const posterUrl=movie.poster_path?`https://image.tmdb.org/t/p/w342${movie.poster_path}`:"";
  document.getElementById("banner-poster").src=posterUrl;
  document.getElementById("banner-bg").style.backgroundImage=posterUrl?`url(${posterUrl})`:"";

  // reset trailer
  trailerOpen=false;
  document.getElementById("trailer-wrap").style.display="none";
  document.getElementById("trailer-frame").src="";
  document.getElementById("bb-trailer-toggle").textContent="▶ Trailer";

  document.getElementById("bb-tmdb").onclick=()=>window.open(`https://www.themoviedb.org/movie/${movie.id}`,"_blank");

  // watchlist button state
  updateWlBtn(movie.id);

  const bd=document.getElementById("backdrop"), bn=document.getElementById("banner");
  bd.classList.add("open");
  bn.style.display="block";
  requestAnimationFrame(()=>requestAnimationFrame(()=>bn.classList.add("open")));
}

function closeBanner(){
  const bd=document.getElementById("backdrop"), bn=document.getElementById("banner");
  bn.classList.remove("open"); bd.classList.remove("open");
  setTimeout(()=>{bn.style.display="none"; document.getElementById("trailer-frame").src="";},350);
  trailerOpen=false;
}

async function toggleTrailer(){
  if(trailerOpen){
    document.getElementById("trailer-wrap").style.display="none";
    document.getElementById("trailer-frame").src="";
    document.getElementById("bb-trailer-toggle").textContent="▶ Trailer";
    trailerOpen=false;
    return;
  }
  document.getElementById("bb-trailer-toggle").textContent="Loading…";
  try{
    const r=await fetch(`https://api.themoviedb.org/3/movie/${currentId}/videos?api_key=${API_KEY}`);
    const d=await r.json();
    const trailer=d.results.find(v=>v.type==="Trailer"&&v.site==="YouTube")||d.results[0];
    if(trailer){
      document.getElementById("trailer-frame").src=`https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
      document.getElementById("trailer-wrap").style.display="block";
      document.getElementById("bb-trailer-toggle").textContent="✕ Close Trailer";
      trailerOpen=true;
    } else {
      window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(currentTitle+" official trailer")}`,"_blank");
      document.getElementById("bb-trailer-toggle").textContent="▶ Trailer";
    }
  } catch(e){
    window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(currentTitle+" official trailer")}`,"_blank");
    document.getElementById("bb-trailer-toggle").textContent="▶ Trailer";
  }
}

// ── watchlist ─────────────────────────────────────────────────────────────────
function getWatchlist(){ try{return JSON.parse(localStorage.getItem("mr_watchlist")||"[]");}catch(e){return[];} }
function saveWatchlist(list){ localStorage.setItem("mr_watchlist",JSON.stringify(list)); updateWlCount(); }

function toggleWatchlist(){
  if(!currentMovie) return;
  let list=getWatchlist();
  const idx=list.findIndex(m=>m.id===currentMovie.id);
  if(idx>-1){ list.splice(idx,1); }
  else { list.unshift({id:currentMovie.id,title:currentMovie.title,poster_path:currentMovie.poster_path,release_date:currentMovie.release_date,vote_average:currentMovie.vote_average}); }
  saveWatchlist(list);
  updateWlBtn(currentMovie.id);
}

function updateWlBtn(id){
  const btn=document.getElementById("bb-wl");
  const saved=getWatchlist().some(m=>m.id===id);
  btn.textContent=saved?"♥ Saved":"♥ Save";
  saved?btn.classList.add("saved"):btn.classList.remove("saved");
}

function updateWlCount(){ document.getElementById("wl-count").textContent=getWatchlist().length; }

function openWatchlistPanel(){
  const list=getWatchlist();
  const el=document.getElementById("wl-list");
  if(list.length===0){ el.innerHTML='<div id="wl-empty">No movies saved yet.<br>Spin and save ones you like!</div>'; }
  else {
    el.innerHTML=list.map(m=>{
      const year=m.release_date?m.release_date.slice(0,4):"";
      const poster=m.poster_path?`https://image.tmdb.org/t/p/w92${m.poster_path}`:"";
      return `<div class="wl-item">
        <img class="wl-thumb" src="${poster}" onerror="this.style.display='none'" alt="">
        <div class="wl-info"><div class="wl-name">${m.title}</div><div class="wl-year">${year}${m.vote_average?" · ★ "+m.vote_average.toFixed(1):""}</div></div>
        <button class="wl-remove" onclick="removeFromWatchlist(${m.id})">✕</button>
      </div>`;
    }).join("");
  }
  document.getElementById("wl-backdrop").classList.add("open");
  const panel=document.getElementById("wl-panel");
  panel.style.display="flex";
  requestAnimationFrame(()=>requestAnimationFrame(()=>panel.classList.add("open")));
}

function removeFromWatchlist(id){
  let list=getWatchlist().filter(m=>m.id!==id);
  saveWatchlist(list);
  openWatchlistPanel();
  if(currentId===id) updateWlBtn(id);
}

function closeWatchlist(){
  document.getElementById("wl-backdrop").classList.remove("open");
  const panel=document.getElementById("wl-panel");
  panel.classList.remove("open");
  setTimeout(()=>panel.style.display="none",250);
}

updateWlCount();
</script>
