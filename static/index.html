<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Movie Roulette</title>
<style>
:root{
  --bg:#07070d;
  --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.1);
  --text:rgba(255,255,255,0.9);
  --muted:rgba(255,255,255,0.4);
  --faint:rgba(255,255,255,0.15);
  --gold:rgb(255,200,80);
  --blue:rgb(100,180,255);
  --red:rgb(255,100,100);
  --radius:12px;
  --panel-height:clamp(280px,42vh,360px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text)}

/* ── canvas ── */
#cv{position:fixed;inset:0;width:100%;height:100%}

/* ── top bar ── */
#topbar{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:linear-gradient(rgba(7,7,13,0.9),transparent);
  z-index:20;pointer-events:none;
}
#logo{font-size:15px;font-weight:700;letter-spacing:0.5px;color:var(--text);pointer-events:all}
#logo span{color:var(--gold)}
#topbar-right{display:flex;gap:8px;pointer-events:all}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:var(--surface);
  color:var(--muted);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;backdrop-filter:blur(8px);
}
.icon-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--faint)}
.icon-btn.active{background:rgba(255,200,80,0.15);border-color:rgba(255,200,80,0.4);color:var(--gold)}

/* ── hint ── */
#hint{position:fixed;top:60px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.2);pointer-events:none;letter-spacing:1px;text-transform:uppercase;z-index:5}

/* ── bottom panel ── */
#panel{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--panel-height);
  background:linear-gradient(transparent 0%, rgba(7,7,13,0.7) 18%, rgba(7,7,13,0.97) 38%);
  padding:0 20px 20px;
  display:flex;flex-direction:column;justify-content:flex-end;
  z-index:20;
  gap:6px;
}

/* filter rows */
.filter-section{display:flex;flex-direction:column;gap:5px}
.filter-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.25);padding-left:2px}
.pill-row{display:flex;gap:5px;flex-wrap:wrap}
.pill{
  padding:4px 11px;border-radius:20px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  font-size:11px;cursor:pointer;font-family:inherit;
  transition:all 0.15s;white-space:nowrap;
  backdrop-filter:blur(4px);
}
.pill:hover{background:var(--surface2);color:var(--text)}
.pill.on{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.45);color:#fff;font-weight:500}
.pill.lang.on{background:rgba(255,200,80,0.14);border-color:rgba(255,200,80,0.4);color:var(--gold)}
.pill.decade.on{background:rgba(100,180,255,0.12);border-color:rgba(100,180,255,0.35);color:var(--blue)}

/* now playing */
#now-playing{margin:2px 0}
#movie-title{
  font-size:clamp(18px,4vw,26px);font-weight:700;
  color:#fff;letter-spacing:-0.4px;line-height:1.2;
  text-shadow:0 2px 16px rgba(0,0,0,0.9);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#movie-meta{font-size:12px;color:var(--muted);margin-top:3px}

/* controls */
#controls{display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
#spin-btn{
  padding:10px 24px;border-radius:var(--radius);
  background:#fff;color:#07070d;
  border:none;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:-0.2px;
  flex-shrink:0;
  transition:opacity 0.15s,transform 0.1s,box-shadow 0.2s;
  box-shadow:0 4px 20px rgba(255,255,255,0.15);
}
#spin-btn:hover{opacity:0.9;box-shadow:0 6px 28px rgba(255,255,255,0.25)}
#spin-btn:active{transform:scale(0.96)}
#spin-btn:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none}
.ctrl-btn{
  padding:10px 14px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surface);
  color:var(--muted);font-size:12px;font-weight:500;
  cursor:pointer;font-family:inherit;
  transition:all 0.15s;white-space:nowrap;flex-shrink:0;
  backdrop-filter:blur(8px);
}
.ctrl-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--faint)}
.ctrl-btn:disabled{opacity:0.3;cursor:not-allowed}
#skip-btn{display:none}
#count-lbl{font-size:11px;color:rgba(255,255,255,0.2);white-space:nowrap;overflow:hidden}
#rating-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
#rating-wrap label{font-size:10px;color:rgba(255,255,255,0.3);white-space:nowrap}
#rslider{width:70px;accent-color:#fff;cursor:pointer}
#rval{font-size:11px;color:rgba(255,255,255,0.6);min-width:22px;text-align:right}

/* ── BANNER ── */
#backdrop{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0);transition:background 0.35s;cursor:pointer}
#backdrop.open{display:block;background:rgba(0,0,0,0.72)}

#banner{
  display:none;
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  z-index:100;
  width:min(680px,94vw);
  max-height:90vh;
  border-radius:20px;
  overflow:hidden;
  opacity:0;
  transition:opacity 0.3s,transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 40px 100px rgba(0,0,0,0.9),0 0 0 1px var(--border);
}
#banner.open{display:block;opacity:1;transform:translate(-50%,-50%) scale(1)}

#banner-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(32px) brightness(0.28) saturate(1.4);transform:scale(1.12)}

#banner-scroll{position:relative;z-index:1;overflow-y:auto;max-height:90vh}
#banner-scroll::-webkit-scrollbar{width:3px}
#banner-scroll::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}

#banner-inner{
  padding:24px;
  background:linear-gradient(160deg,rgba(15,15,28,0.75) 0%,rgba(5,5,12,0.9) 100%);
  backdrop-filter:blur(2px);
}

#banner-close{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,0.1);border:1px solid var(--border);
  color:var(--muted);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;z-index:3;
}
#banner-close:hover{background:var(--surface2);color:#fff}

/* banner top */
#banner-top{display:flex;gap:18px;margin-bottom:18px}
#banner-poster{
  width:clamp(90px,22vw,130px);
  height:clamp(135px,33vw,195px);
  border-radius:10px;object-fit:cover;flex-shrink:0;
  box-shadow:0 10px 36px rgba(0,0,0,0.7);
  background:var(--surface);
}
#banner-info{flex:1;min-width:0;display:flex;flex-direction:column;padding-top:2px}
#banner-tag{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;opacity:0.85}
#banner-title{font-size:clamp(16px,4vw,22px);font-weight:700;color:#fff;line-height:1.25;letter-spacing:-0.3px}
#banner-meta{font-size:12px;color:var(--muted);margin-top:5px}
#banner-stars{display:flex;align-items:center;gap:2px;margin-top:6px}
.star{font-size:12px;color:var(--gold);opacity:0.85}
#banner-vote{font-size:10px;color:rgba(255,255,255,0.25);margin-left:5px}
#banner-genres{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}
.genre-tag{padding:2px 8px;border-radius:20px;font-size:10px;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--muted)}

#banner-overview{font-size:12px;color:rgba(255,255,255,0.62);line-height:1.75;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:16px}

/* trailer */
#trailer-wrap{display:none;border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:#000;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
#trailer-frame{width:100%;height:100%;border:none;display:block}

/* banner buttons */
#banner-btns{display:flex;gap:7px;flex-wrap:wrap}
.bb{
  padding:8px 16px;border-radius:9px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--muted);font-size:12px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:all 0.15s;
  backdrop-filter:blur(4px);
}
.bb:hover{background:var(--surface2);color:#fff;border-color:var(--faint)}
.bb.primary{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.35);color:#fff}
.bb.wl-btn{color:rgba(255,130,130,0.9)}
.bb.wl-btn.saved{background:rgba(255,80,80,0.15);border-color:rgba(255,80,80,0.4);color:rgb(255,150,150)}
.bb.trailer-btn{color:var(--blue)}

/* ── WATCHLIST PANEL ── */
#wl-backdrop{display:none;position:fixed;inset:0;z-index:149;background:rgba(0,0,0,0.6)}
#wl-backdrop.open{display:block}

#wl-panel{
  display:none;flex-direction:column;
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  z-index:150;
  width:min(460px,92vw);max-height:78vh;
  border-radius:18px;
  background:rgba(10,10,20,0.98);
  border:1px solid var(--border);
  box-shadow:0 28px 70px rgba(0,0,0,0.85);
  overflow:hidden;
  opacity:0;
  transition:opacity 0.25s,transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
#wl-panel.open{display:flex;opacity:1;transform:translate(-50%,-50%) scale(1)}

#wl-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#wl-header h3{font-size:15px;font-weight:700;color:#fff}
#wl-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:2px 4px}
#wl-close:hover{color:#fff}

#wl-list{overflow-y:auto;flex:1;padding:10px 16px 16px}
#wl-list::-webkit-scrollbar{width:3px}
#wl-list::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}

.wl-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);
}
.wl-item:last-child{border-bottom:none}
.wl-thumb{width:40px;height:58px;border-radius:6px;object-fit:cover;background:var(--surface);flex-shrink:0}
.wl-info{flex:1;min-width:0}
.wl-name{font-size:13px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wl-sub{font-size:11px;color:var(--muted);margin-top:2px}
.wl-rm{background:none;border:none;color:rgba(255,100,100,0.5);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1}
.wl-rm:hover{color:var(--red)}
#wl-empty{text-align:center;padding:36px 20px;font-size:13px;color:var(--muted);line-height:1.7}

/* ── mobile adjustments ── */
@media(max-width:520px){
  #panel{padding:0 14px 16px;gap:5px}
  .pill{font-size:10px;padding:3px 9px}
  #movie-title{font-size:18px}
  #spin-btn{padding:10px 20px;font-size:13px}
  .ctrl-btn{padding:10px 11px;font-size:11px}
  #rating-wrap label{display:none}
  #banner-inner{padding:18px}
  #banner-top{gap:14px}
  #banner-btns{gap:5px}
  .bb{padding:7px 12px;font-size:11px}
  #topbar{padding:12px 14px}
}
@media(max-width:380px){
  .pill{font-size:9.5px;padding:3px 8px}
  #count-lbl{display:none}
}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<!-- top bar -->
<div id="topbar">
  <div id="logo">🎬 Movie<span>Roulette</span></div>
  <div id="topbar-right">
    <button class="icon-btn" id="wl-icon-btn" onclick="openWatchlistPanel()" title="Watchlist">♥</button>
  </div>
</div>

<div id="hint">drag to spin</div>

<!-- banner -->
<div id="backdrop" onclick="closeBanner()"></div>
<div id="banner">
  <div id="banner-bg"></div>
  <button id="banner-close" onclick="closeBanner()">✕</button>
  <div id="banner-scroll">
    <div id="banner-inner">
      <div id="banner-top">
        <img id="banner-poster" alt="">
        <div id="banner-info">
          <div id="banner-tag">Tonight's Pick</div>
          <div id="banner-title"></div>
          <div id="banner-meta"></div>
          <div id="banner-stars"></div>
          <div id="banner-genres"></div>

      <div id="trailer-wrap"><iframe id="trailer-frame" allowfullscreen allow="autoplay; encrypted-media"></iframe></div>

        <button class="bb primary" onclick="closeBanner();spin()">Spin Again</button>
        <button class="bb" id="bb-skip" onclick="closeBanner();skipMovie()">↺ Not this one</button>
        <button class="bb trailer-btn" id="bb-trailer" onclick="toggleTrailer()">▶ Trailer</button>

</div>

<!-- watchlist -->
<div id="wl-backdrop" onclick="closeWatchlist()"></div>
<div id="wl-panel">

<!-- bottom panel -->

    <div id="rating-wrap">
      <label>Rating</label>

    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const API_KEY = "db76c689c142949499b276e42606539a";

// ── filters ──────────────────────────────────────────────────────────────────
let selectedGenre="", selectedLang="", selectedFrom="", selectedTo="";

document.querySelectorAll("#genre-bar .pill").forEach(b=>{
  b.onclick=()=>{document.querySelectorAll("#genre-bar .pill").forEach(x=>x.classList.remove("on"));b.classList.add("on");selectedGenre=b.dataset.id;};
});
document.querySelectorAll("#lang-bar .pill").forEach(b=>{
  b.onclick=()=>{document.querySelectorAll("#lang-bar .pill").forEach(x=>x.classList.remove("on"));b.classList.add("on");selectedLang=b.dataset.lang;};
});
document.querySelectorAll("#decade-bar .pill").forEach(b=>{
  b.onclick=()=>{document.querySelectorAll("#decade-bar .pill").forEach(x=>x.classList.remove("on"));b.classList.add("on");selectedFrom=b.dataset.from;selectedTo=b.dataset.to;};
});

const rslider=document.getElementById("rslider");
const rvalEl=document.getElementById("rval");
rslider.oninput=()=>rvalEl.textContent=parseFloat(rslider.value).toFixed(1)+"+";

// ── Three.js ──────────────────────────────────────────────────────────────────
const canvas=document.getElementById("cv");
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x07070d,1);

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x07070d,0.026);

const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,300);
camera.position.set(0,2.5,13);
camera.lookAt(0,0,0);

window.addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
renderer.setSize(innerWidth,innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,0.2));
const kL=new THREE.PointLight(0x6688ff,3,35); kL.position.set(-6,10,6); scene.add(kL);
const rL=new THREE.PointLight(0xff5533,2,28); rL.position.set(6,6,-8); scene.add(rL);
const fL=new THREE.PointLight(0x88ffcc,1,20); fL.position.set(0,-4,10); scene.add(fL);
const dL=new THREE.DirectionalLight(0xffffff,0.6); dL.position.set(0,12,5); scene.add(dL);

const floor=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshStandardMaterial({color:0x05050b,roughness:0.3,metalness:0.7}));
floor.rotation.x=-Math.PI/2; floor.position.y=-1.06; scene.add(floor);

const PALETTES=[["#1a0a2e","#4a1080"],["#0a1a2e","#1050a0"],["#2e0a0a","#a03010"],["#0a2e1a","#10a050"],["#2e2a0a","#a09010"],["#1a1a2e","#5050c0"],["#2e0a1a","#a01050"],["#0a2e2e","#10a0a0"],["#1e0a0e","#803040"]];
function makeCardTex(p){
  const c=document.createElement("canvas"); c.width=256; c.height=384;
  const ctx=c.getContext("2d");
  const g=ctx.createLinearGradient(0,0,256,384); g.addColorStop(0,p[0]); g.addColorStop(1,p[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,256,384);
  ctx.fillStyle="rgba(0,0,0,0.5)"; for(let i=0;i<8;i++) ctx.fillRect(8+i*30,8,18,14);
  ctx.fillStyle="rgba(255,255,255,0.03)"; for(let y=0;y<384;y+=4) ctx.fillRect(0,y,256,2);
  ctx.strokeStyle="rgba(255,255,255,0.1)"; ctx.lineWidth=1; ctx.strokeRect(20,36,216,280);
  ctx.beginPath(); ctx.moveTo(20,36); ctx.lineTo(236,316); ctx.moveTo(236,36); ctx.lineTo(20,316); ctx.stroke();
  ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(0,330,256,54);
  return new THREE.CanvasTexture(c);
}

const TOTAL=48, RADIUS=8, cards=[];
for(let i=0;i<TOTAL;i++){
  const a=(i/TOTAL)*Math.PI*2, p=PALETTES[i%PALETTES.length];
  const mats=[
    new THREE.MeshStandardMaterial({color:0x1a1a28,roughness:0.7,metalness:0.5}),
    new THREE.MeshStandardMaterial({color:0x1a1a28,roughness:0.7,metalness:0.5}),
    new THREE.MeshStandardMaterial({color:0x1a1a28,roughness:0.7,metalness:0.5}),
    new THREE.MeshStandardMaterial({color:0x1a1a28,roughness:0.7,metalness:0.5}),
    new THREE.MeshStandardMaterial({map:makeCardTex(p),roughness:0.45,metalness:0.25}),
    new THREE.MeshStandardMaterial({color:0x0d0d18,roughness:0.9,metalness:0.1}),
  ];
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(1.5,2.25,0.07),mats);
  mesh.position.set(Math.cos(a)*RADIUS,0,Math.sin(a)*RADIUS);
  mesh.rotation.y=-a+Math.PI/2;
  mesh.userData={baseAngle:a};
  scene.add(mesh); cards.push(mesh);
}

const pGeo=new THREE.BufferGeometry(), pPos=new Float32Array(300*3);
for(let i=0;i<300;i++){pPos[i*3]=(Math.random()-0.5)*40;pPos[i*3+1]=(Math.random()-0.5)*20;pPos[i*3+2]=(Math.random()-0.5)*40;}
pGeo.setAttribute("position",new THREE.BufferAttribute(pPos,3));
scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x8888cc,size:0.06,transparent:true,opacity:0.45})));

let rotY=0,autoSpin=true,isDragging=false,lastX=0,velocity=0,highlighted=-1;
canvas.addEventListener("mousedown",e=>{isDragging=true;lastX=e.clientX;autoSpin=false;velocity=0;});
window.addEventListener("mouseup",()=>{isDragging=false;});
window.addEventListener("mousemove",e=>{if(!isDragging)return;const dx=e.clientX-lastX;velocity=dx*0.002;rotY+=dx*0.003;lastX=e.clientX;});
canvas.addEventListener("touchstart",e=>{isDragging=true;lastX=e.touches[0].clientX;autoSpin=false;},{passive:true});
window.addEventListener("touchend",()=>{isDragging=false;});
window.addEventListener("touchmove",e=>{if(!isDragging)return;const dx=e.touches[0].clientX-lastX;velocity=dx*0.002;rotY+=dx*0.003;lastX=e.touches[0].clientX;},{passive:true});

let spinAnim=false,spinStart=0,spinTarget=0,spinStartTime=0;
const SPIN_DUR=2600;
function easeInOutQuint(t){return t<0.5?16*t*t*t*t*t:1-Math.pow(-2*t+2,5)/2;}

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  if(spinAnim){
    const p=Math.min((now-spinStartTime)/SPIN_DUR,1);
    rotY=spinStart+easeInOutQuint(p)*(spinTarget-spinStart);
    if(p>=1) spinAnim=false;
  } else if(autoSpin){rotY+=0.004;}
  else if(!isDragging&&Math.abs(velocity)>0.0004){rotY+=velocity;velocity*=0.94;}
  cards.forEach((card,i)=>{
    const a=card.userData.baseAngle+rotY;
    card.position.x=Math.cos(a)*RADIUS; card.position.z=Math.sin(a)*RADIUS; card.rotation.y=-a+Math.PI/2;
    const h=i===highlighted;
    card.position.y+=((h?0.5:0)-card.position.y)*0.1;
    card.scale.setScalar(card.scale.x+((h?1.1:1)-card.scale.x)*0.1);
    if(h){card.material[4].emissive=new THREE.Color(0x553311);card.material[4].emissiveIntensity=0.45;}
    else{card.material[4].emissiveIntensity=0;}
  });
  kL.position.x=Math.sin(now*0.0007)*8;
  rL.position.z=Math.cos(now*0.0005)*8-6;
  fL.position.x=Math.sin(now*0.0011)*5;
  renderer.render(scene,camera);
}
animate();

// ── fetch ─────────────────────────────────────────────────────────────────────
let isFetching=false,currentMovie=null,currentId=null,currentTitle="";
let lastResults=[],lastResultIdx=0;

const GENRE_MAP={28:"Action",35:"Comedy",18:"Drama",27:"Horror",878:"Sci-Fi",53:"Thriller",10749:"Romance",16:"Animation",80:"Crime",9648:"Mystery",14:"Fantasy",10402:"Music",99:"Documentary",36:"History",10752:"War",37:"Western"};

async function fetchMovies(){
  const page=Math.floor(Math.random()*12)+1;
  let rating=parseFloat(rslider.value);
  async function tryFetch(r){
    let url=`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&vote_count.gte=50&vote_average.gte=${r}&page=${page}&language=en-US`;
    if(selectedGenre) url+=`&with_genres=${selectedGenre}`;
    if(selectedLang)  url+=`&with_original_language=${selectedLang}`;
    if(selectedFrom)  url+=`&primary_release_date.gte=${selectedFrom}-01-01`;
    if(selectedTo)    url+=`&primary_release_date.lte=${selectedTo}-12-31`;
    const res=await fetch(url); return await res.json();
  }
  let d=await tryFetch(rating);
  while((!d.results||d.results.length===0)&&rating>5){rating=Math.max(rating-1,5);d=await tryFetch(rating);}
  if(!d.results||d.results.length===0) return null;
  const label=rating<parseFloat(rslider.value)?`Showing ${rating}+ (loosened for results)`:`${(d.total_results||0).toLocaleString()} movies`;
  document.getElementById("count-lbl").textContent=label;
  lastResults=d.results; lastResultIdx=Math.floor(Math.random()*lastResults.length);
  return lastResults[lastResultIdx];
}

async function spin(){
  if(isFetching) return;
  isFetching=true;
  closeBanner();
  document.getElementById("spin-btn").disabled=true;
  document.getElementById("skip-btn").style.display="none";
  document.getElementById("movie-title").textContent="Spinning…";
  document.getElementById("movie-meta").textContent="";
  highlighted=-1;
  const movie=await fetchMovies().catch(()=>null);
  currentMovie=movie;
  const chosenIdx=Math.floor(Math.random()*TOTAL);
  spinStart=rotY; spinTarget=rotY+Math.PI*2*5-((rotY)%(Math.PI*2));
  spinStartTime=performance.now(); spinAnim=true; autoSpin=false;
  setTimeout(()=>{
    highlighted=chosenIdx;
    if(movie){
      const year=movie.release_date?movie.release_date.slice(0,4):"";
      document.getElementById("movie-title").textContent=movie.title;
      document.getElementById("movie-meta").textContent=(year||"")+(movie.vote_average?" · ★ "+movie.vote_average.toFixed(1):"");
      document.getElementById("skip-btn").style.display="inline-flex";
      setTimeout(()=>showBanner(movie),300);
    } else {
      document.getElementById("movie-title").textContent="No movies found";
      document.getElementById("movie-meta").textContent="Try adjusting your filters";
    }
    isFetching=false;
    document.getElementById("spin-btn").disabled=false;
  },SPIN_DUR+100);
}

async function skipMovie(){
  if(isFetching) return;
  closeBanner();
  if(lastResults.length>1){
    lastResultIdx=(lastResultIdx+1)%lastResults.length;
    const movie=lastResults[lastResultIdx];
    currentMovie=movie;
    const year=movie.release_date?movie.release_date.slice(0,4):"";
    document.getElementById("movie-title").textContent=movie.title;
    document.getElementById("movie-meta").textContent=(year||"")+(movie.vote_average?" · ★ "+movie.vote_average.toFixed(1):"");
    setTimeout(()=>showBanner(movie),200);
  } else {spin();}
}

// ── banner ─────────────────────────────────────────────────────────────────────
let trailerOpen=false;

function showBanner(movie){
  const year=movie.release_date?movie.release_date.slice(0,4):"";
  currentId=movie.id; currentTitle=movie.title;
  document.getElementById("banner-title").textContent=movie.title;
  document.getElementById("banner-overview").textContent=movie.overview||"";
  document.getElementById("banner-meta").textContent=[year,movie.vote_average?"★ "+movie.vote_average.toFixed(1):null].filter(Boolean).join("  ·  ");

  const stars=document.getElementById("banner-stars");
  if(movie.vote_average){
    const f=Math.round(movie.vote_average/2);
    stars.innerHTML=Array.from({length:5},(_,i)=>`<span class="star">${i<f?"★":"☆"}</span>`).join("")+`<span id="banner-vote">${movie.vote_count?movie.vote_count.toLocaleString()+" votes":""}</span>`;
  } else stars.innerHTML="";

  const genresEl=document.getElementById("banner-genres");
  if(movie.genre_ids&&movie.genre_ids.length){
    genresEl.innerHTML=movie.genre_ids.slice(0,4).map(id=>GENRE_MAP[id]?`<span class="genre-tag">${GENRE_MAP[id]}</span>`:"").join("");
  } else genresEl.innerHTML="";

  const posterUrl=movie.poster_path?`https://image.tmdb.org/t/p/w342${movie.poster_path}`:"";
  document.getElementById("banner-poster").src=posterUrl;
  document.getElementById("banner-bg").style.backgroundImage=posterUrl?`url(${posterUrl})`:"";

  trailerOpen=false;
  document.getElementById("trailer-wrap").style.display="none";
  document.getElementById("trailer-frame").src="";
  document.getElementById("bb-trailer").textContent="▶ Trailer";
  document.getElementById("bb-tmdb").onclick=()=>window.open(`https://www.themoviedb.org/movie/${movie.id}`,"_blank");
  updateWlBtn(movie.id);

  const bd=document.getElementById("backdrop"),bn=document.getElementById("banner");
  bd.classList.add("open"); bn.style.display="block";
  requestAnimationFrame(()=>requestAnimationFrame(()=>bn.classList.add("open")));
}

function closeBanner(){
  const bd=document.getElementById("backdrop"),bn=document.getElementById("banner");
  bn.classList.remove("open"); bd.classList.remove("open");
  setTimeout(()=>{bn.style.display="none";document.getElementById("trailer-frame").src="";},350);
  trailerOpen=false;
}

async function toggleTrailer(){
  if(trailerOpen){
    document.getElementById("trailer-wrap").style.display="none";
    document.getElementById("trailer-frame").src="";
    document.getElementById("bb-trailer").textContent="▶ Trailer";
    trailerOpen=false; return;
  }
  document.getElementById("bb-trailer").textContent="Loading…";
  try{
    const r=await fetch(`https://api.themoviedb.org/3/movie/${currentId}/videos?api_key=${API_KEY}`);
    const d=await r.json();
    const t=d.results.find(v=>v.type==="Trailer"&&v.site==="YouTube")||d.results.find(v=>v.site==="YouTube");
    if(t){
      document.getElementById("trailer-frame").src=`https://www.youtube.com/embed/${t.key}?autoplay=1`;
      document.getElementById("trailer-wrap").style.display="block";
      document.getElementById("bb-trailer").textContent="✕ Trailer";
      trailerOpen=true;
    } else {
      window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(currentTitle+" official trailer")}`,"_blank");
      document.getElementById("bb-trailer").textContent="▶ Trailer";
    }
  } catch(e){
    window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(currentTitle+" official trailer")}`,"_blank");
    document.getElementById("bb-trailer").textContent="▶ Trailer";
  }
}

// ── watchlist ─────────────────────────────────────────────────────────────────
function getWL(){try{return JSON.parse(localStorage.getItem("mr_wl")||"[]");}catch(e){return[];}}
function saveWL(l){localStorage.setItem("mr_wl",JSON.stringify(l));updateWlCount();}

function toggleWatchlist(){
  if(!currentMovie) return;
  let l=getWL(); const idx=l.findIndex(m=>m.id===currentMovie.id);
  if(idx>-1) l.splice(idx,1);
  else l.unshift({id:currentMovie.id,title:currentMovie.title,poster_path:currentMovie.poster_path,release_date:currentMovie.release_date,vote_average:currentMovie.vote_average});
  saveWL(l); updateWlBtn(currentMovie.id);
}

function updateWlBtn(id){
  const btn=document.getElementById("bb-wl");
  const saved=getWL().some(m=>m.id===id);
  btn.textContent=saved?"♥ Saved":"♥ Save";
  saved?btn.classList.add("saved"):btn.classList.remove("saved");
}

function updateWlCount(){
  const n=getWL().length;
  document.getElementById("wl-count-h").textContent=n?`(${n})`:"";
  const ib=document.getElementById("wl-icon-btn");
  ib.classList.toggle("active",n>0);
}

function openWatchlistPanel(){
  const list=getWL(), el=document.getElementById("wl-list");
  if(!list.length){el.innerHTML='<div id="wl-empty">No movies saved yet.<br>Spin and hit ♥ Save on ones you like.</div>';}
  else{
    el.innerHTML=list.map(m=>{
      const year=m.release_date?m.release_date.slice(0,4):"";
      const p=m.poster_path?`https://image.tmdb.org/t/p/w92${m.poster_path}`:"";
      return `<div class="wl-item"><img class="wl-thumb" src="${p}" onerror="this.style.background='var(--surface)'" alt=""><div class="wl-info"><div class="wl-name">${m.title}</div><div class="wl-sub">${year}${m.vote_average?" · ★ "+m.vote_average.toFixed(1):""}</div></div><button class="wl-rm" onclick="removeWL(${m.id})">✕</button></div>`;
    }).join("");
  }
  document.getElementById("wl-backdrop").classList.add("open");
  const p=document.getElementById("wl-panel"); p.style.display="flex";
  requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add("open")));
}

function removeWL(id){
  saveWL(getWL().filter(m=>m.id!==id));
  openWatchlistPanel();
  if(currentId===id) updateWlBtn(id);
}

function closeWatchlist(){
  document.getElementById("wl-backdrop").classList.remove("open");
  const p=document.getElementById("wl-panel"); p.classList.remove("open");
  setTimeout(()=>p.style.display="none",250);
}

updateWlCount();
</script>
