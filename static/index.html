<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Movie Roulette</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

:root{
  --bg:#05050a;
  --gold:#ffc950;
  --blue:#60b4ff;
  --red:#ff6b6b;
  --green:#4fffb0;
  --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.15);
  --text:#f0f0f8;
  --muted:rgba(240,240,248,0.4);
  --faint:rgba(240,240,248,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text)}

/* ══ CANVAS ══════════════════════════════════════════════════════════════════ */
#cv{position:fixed;inset:0;width:100%;height:100%}

/* ══ AMBIENT ORBS (CSS animated background glow) ════════════════════════════ */
#orbs{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 8s ease-in-out infinite;opacity:0}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(100,80,255,0.18),transparent 70%);top:-100px;left:-100px;animation-delay:0s;animation:orbFloat1 12s ease-in-out infinite}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(255,80,120,0.12),transparent 70%);bottom:-100px;right:-100px;animation-delay:2s;animation:orbFloat2 10s ease-in-out infinite}
.orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(80,200,255,0.1),transparent 70%);top:40%;left:50%;animation:orbFloat3 14s ease-in-out infinite}
@keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1);opacity:0.8}50%{transform:translate(60px,40px) scale(1.15);opacity:1}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(1);opacity:0.6}50%{transform:translate(-50px,-30px) scale(1.1);opacity:0.9}}
@keyframes orbFloat3{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.4}50%{transform:translate(-50%,-50%) scale(1.2);opacity:0.7}}

/* ══ TOP BAR ═════════════════════════════════════════════════════════════════ */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px;
  background:linear-gradient(rgba(5,5,10,0.85),transparent);
  backdrop-filter:blur(0px);
}
#logo{
  font-size:16px;font-weight:800;letter-spacing:-0.3px;
  background:linear-gradient(135deg,#fff 30%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#topbar-actions{display:flex;gap:8px}
.top-btn{
  height:34px;padding:0 14px;border-radius:20px;
  border:1px solid var(--border2);
  background:rgba(255,255,255,0.06);
  color:var(--muted);font-size:12px;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif;
  transition:all 0.2s;display:flex;align-items:center;gap:6px;
  backdrop-filter:blur(12px);
}
.top-btn:hover{background:rgba(255,255,255,0.12);color:var(--text);border-color:rgba(255,255,255,0.25)}
.top-btn.glow{background:rgba(255,200,80,0.1);border-color:rgba(255,200,80,0.35);color:var(--gold)}
.top-btn .badge{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}

/* ══ HINT ════════════════════════════════════════════════════════════════════ */
#hint{
  position:fixed;top:64px;left:50%;transform:translateX(-50%);
  font-size:10px;color:rgba(255,255,255,0.18);
  pointer-events:none;letter-spacing:2px;text-transform:uppercase;z-index:5;
  animation:hintPulse 3s ease-in-out infinite;
}
@keyframes hintPulse{0%,100%{opacity:0.5}50%{opacity:1}}

/* ══ BOTTOM PANEL ════════════════════════════════════════════════════════════ */
#panel{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  padding:0 20px 22px;
  display:flex;flex-direction:column;gap:8px;
}
/* frosted glass gradient */
#panel::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(transparent,rgba(5,5,10,0.6) 15%,rgba(5,5,10,0.97) 45%);
  pointer-events:none;
}
#panel>*{position:relative;z-index:1}

/* filter sections */
.fs{display:flex;flex-direction:column;gap:4px}
.fl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);padding-left:1px}
.pr{display:flex;gap:4px;flex-wrap:wrap}

/* pill */
.p{
  padding:4px 12px;border-radius:20px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  color:var(--muted);font-size:11px;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif;
  transition:all 0.18s;white-space:nowrap;
  position:relative;overflow:hidden;
}
.p::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.06),transparent);opacity:0;transition:opacity 0.2s}
.p:hover::before{opacity:1}
.p:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.8)}
.p:active{transform:scale(0.96)}

.p.on{border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.12);color:#fff;font-weight:600}
.p.on::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent)}
.p.lang.on{border-color:rgba(255,200,80,0.5);background:rgba(255,200,80,0.1);color:var(--gold)}
.p.lang.on::after{background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.p.decade.on{border-color:rgba(96,180,255,0.5);background:rgba(96,180,255,0.1);color:var(--blue)}
.p.decade.on::after{background:linear-gradient(90deg,transparent,var(--blue),transparent)}

/* now playing */
#np{display:flex;flex-direction:column;gap:3px;min-height:44px}
#movie-title{
  font-size:clamp(17px,3.5vw,24px);font-weight:700;
  color:#fff;letter-spacing:-0.4px;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#movie-meta{font-size:12px;color:var(--muted)}

/* controls row */
#ctrls{display:flex;align-items:center;gap:8px}

#spin-btn{
  position:relative;overflow:hidden;
  padding:11px 28px;border-radius:14px;
  background:linear-gradient(135deg,#fff 0%,#e8e8ff 100%);
  color:#07070d;border:none;
  font-size:13px;font-weight:800;letter-spacing:-0.2px;
  cursor:pointer;font-family:'Inter',sans-serif;
  flex-shrink:0;
  transition:transform 0.15s,box-shadow 0.2s,opacity 0.15s;
  box-shadow:0 4px 24px rgba(255,255,255,0.2),0 0 0 1px rgba(255,255,255,0.1);
}
#spin-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,200,80,0.3),rgba(255,100,100,0.1),rgba(100,150,255,0.2));
  opacity:0;transition:opacity 0.3s;
}
#spin-btn:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(255,255,255,0.3)}
#spin-btn:hover::before{opacity:1}
#spin-btn:active{transform:scale(0.96) translateY(0)}
#spin-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none}

/* spinning animation on button */
#spin-btn.spinning{
  animation:btnPulse 0.6s ease-in-out infinite alternate;
}
@keyframes btnPulse{from{box-shadow:0 4px 24px rgba(255,255,255,0.2)}to{box-shadow:0 4px 40px rgba(255,255,255,0.45),0 0 60px rgba(180,150,255,0.2)}}

.cb{
  padding:11px 14px;border-radius:14px;
  border:1px solid var(--border2);
  background:rgba(255,255,255,0.05);
  color:var(--muted);font-size:12px;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;
  transition:all 0.18s;white-space:nowrap;
  backdrop-filter:blur(8px);flex-shrink:0;
}
.cb:hover{background:rgba(255,255,255,0.1);color:var(--text);border-color:rgba(255,255,255,0.25)}
.cb:disabled{opacity:0.3;cursor:not-allowed}
#skip-btn{display:none}
#count-lbl{font-size:10px;color:rgba(255,255,255,0.2);overflow:hidden;flex:1;min-width:0;white-space:nowrap;text-overflow:ellipsis}
#rw{display:flex;align-items:center;gap:6px;flex-shrink:0}
#rw label{font-size:10px;color:rgba(255,255,255,0.3);white-space:nowrap}
#rslider{width:68px;accent-color:var(--gold);cursor:pointer}
#rval{font-size:11px;color:rgba(255,255,255,0.55);min-width:26px;text-align:right;font-weight:600}

/* ══ BANNER ══════════════════════════════════════════════════════════════════ */
#backdrop{
  display:none;position:fixed;inset:0;z-index:99;
  background:rgba(0,0,0,0);transition:background 0.4s;cursor:pointer;
  backdrop-filter:blur(0px);transition:background 0.4s,backdrop-filter 0.4s;
}
#backdrop.open{display:block;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)}

#banner{
  display:none;position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.88) translateY(20px);
  z-index:100;width:min(700px,94vw);
  border-radius:22px;overflow:hidden;
  opacity:0;
  transition:opacity 0.35s cubic-bezier(0.22,1,0.36,1),transform 0.35s cubic-bezier(0.22,1,0.36,1);
  box-shadow:0 48px 120px rgba(0,0,0,0.95),0 0 0 1px rgba(255,255,255,0.08),0 0 80px rgba(100,80,255,0.08);
}
#banner.open{display:block;opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0)}

#banner-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:blur(40px) brightness(0.22) saturate(1.6);
  transform:scale(1.15);
  transition:background-image 0.5s;
}
/* animated shimmer on banner */
#banner-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(100,80,255,0.1) 0%,transparent 50%,rgba(255,80,120,0.08) 100%);
  animation:bannerShimmer 6s ease-in-out infinite;
}
@keyframes bannerShimmer{0%,100%{opacity:0.5}50%{opacity:1}}

#banner-scroll{position:relative;z-index:1;overflow-y:auto;max-height:88vh}
#banner-scroll::-webkit-scrollbar{width:3px}
#banner-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px}

#banner-inner{
  padding:26px;
  background:linear-gradient(160deg,rgba(12,12,24,0.82) 0%,rgba(5,5,14,0.92) 100%);
}

#banner-close{
  position:absolute;top:14px;right:14px;
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  color:var(--muted);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;z-index:3;
}
#banner-close:hover{background:rgba(255,255,255,0.18);color:#fff;transform:rotate(90deg)}

/* banner top */
#banner-top{display:flex;gap:20px;margin-bottom:20px}

#banner-poster{
  width:clamp(90px,22vw,130px);
  height:clamp(135px,33vw,195px);
  border-radius:12px;object-fit:cover;flex-shrink:0;
  box-shadow:0 12px 40px rgba(0,0,0,0.8),0 0 0 1px rgba(255,255,255,0.06);
  background:var(--surface);
  transition:transform 0.4s cubic-bezier(0.22,1,0.36,1);
}
#banner.open #banner-poster{transform:none}

#banner-info{flex:1;min-width:0;display:flex;flex-direction:column;padding-top:2px}
#banner-tag{
  font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);margin-bottom:8px;opacity:0.9;
  display:flex;align-items:center;gap:6px;
}
#banner-tag::before{content:'';width:20px;height:1px;background:var(--gold);opacity:0.6}
#banner-title{font-size:clamp(16px,4vw,22px);font-weight:800;color:#fff;line-height:1.2;letter-spacing:-0.4px}
#banner-meta{font-size:12px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:8px}
#banner-stars{display:flex;align-items:center;gap:2px;margin-top:8px}
.star{font-size:12px}
.star.filled{color:var(--gold)}
.star.empty{color:rgba(255,255,255,0.2)}
#banner-vote{font-size:10px;color:rgba(255,255,255,0.25);margin-left:6px}
#banner-genres{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.gtag{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:500;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5)}

#banner-overview{
  font-size:13px;color:rgba(255,255,255,0.6);
  line-height:1.8;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:18px;
}

/* trailer embed */
#trailer-wrap{
  display:none;border-radius:14px;overflow:hidden;
  aspect-ratio:16/9;background:#000;
  margin-bottom:18px;
  box-shadow:0 12px 48px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.06);
  animation:trailerIn 0.4s cubic-bezier(0.22,1,0.36,1);
}
@keyframes trailerIn{from{opacity:0;transform:scaleY(0.8)}to{opacity:1;transform:scaleY(1)}}
#trailer-frame{width:100%;height:100%;border:none;display:block}

/* banner buttons */
#banner-btns{display:flex;gap:6px;flex-wrap:wrap}
.bb{
  padding:8px 16px;border-radius:10px;
  border:1px solid var(--border2);
  background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.65);
  font-size:12px;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;
  transition:all 0.18s;
  position:relative;overflow:hidden;
}
.bb::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.05),transparent);opacity:0;transition:opacity 0.2s}
.bb:hover::before{opacity:1}
.bb:hover{border-color:rgba(255,255,255,0.3);color:#fff;transform:translateY(-1px)}
.bb:active{transform:translateY(0) scale(0.97)}
.bb.primary{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3);color:#fff}
.bb.trailer{color:var(--blue);border-color:rgba(96,180,255,0.3)}
.bb.trailer:hover{background:rgba(96,180,255,0.1)}
.bb.wl{color:var(--red);border-color:rgba(255,107,107,0.3)}
.bb.wl:hover{background:rgba(255,107,107,0.1)}
.bb.wl.saved{background:rgba(255,107,107,0.15);border-color:rgba(255,107,107,0.5);color:#ff9b9b}

/* ══ WATCHLIST PANEL ══════════════════════════════════════════════════════ */
#wl-bd{display:none;position:fixed;inset:0;z-index:149;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px)}
#wl-bd.open{display:block}
#wl-panel{
  display:none;flex-direction:column;
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  z-index:150;width:min(460px,92vw);max-height:78vh;
  border-radius:20px;
  background:rgba(8,8,18,0.98);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 32px 80px rgba(0,0,0,0.9);
  overflow:hidden;opacity:0;
  transition:opacity 0.28s,transform 0.32s cubic-bezier(0.22,1,0.36,1);
}
#wl-panel.open{display:flex;opacity:1;transform:translate(-50%,-50%) scale(1)}
#wl-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
#wl-hdr h3{font-size:15px;font-weight:700;color:#fff}
#wl-hdr .sub{font-size:12px;color:var(--muted);margin-left:8px;font-weight:400}
#wl-x{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 4px;transition:color 0.15s}
#wl-x:hover{color:#fff}
#wl-list{overflow-y:auto;flex:1;padding:10px 16px 16px}
#wl-list::-webkit-scrollbar{width:3px}
#wl-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.wi{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);animation:wiIn 0.25s ease forwards}
@keyframes wiIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.wi:last-child{border-bottom:none}
.wt{width:40px;height:58px;border-radius:7px;object-fit:cover;background:var(--surface);flex-shrink:0}
.wi-info{flex:1;min-width:0}
.wi-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wi-sub{font-size:11px;color:var(--muted);margin-top:2px}
.wi-rm{background:none;border:none;color:rgba(255,100,100,0.4);font-size:15px;cursor:pointer;padding:4px;flex-shrink:0;transition:color 0.15s}
.wi-rm:hover{color:var(--red)}
#wl-empty{text-align:center;padding:40px 20px;font-size:13px;color:var(--muted);line-height:1.8}
#wl-empty .icon{font-size:36px;margin-bottom:12px;opacity:0.3}

/* ══ RESPONSIVE ══════════════════════════════════════════════════════════════ */
@media(max-width:540px){
  #panel{padding:0 14px 18px;gap:7px}
  .p{font-size:10.5px;padding:3px 10px}
  #spin-btn{padding:11px 20px;font-size:13px}
  .cb{padding:11px 11px;font-size:11px}
  #rw label{display:none}
  #banner-inner{padding:18px}
  #banner-top{gap:14px}
  .bb{padding:7px 12px;font-size:11px}
  #topbar{padding:12px 16px}
  #logo{font-size:14px}
}
@media(max-width:380px){
  .p{font-size:10px;padding:3px 8px}
  #count-lbl{display:none}
  #rslider{width:60px}
}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<!-- ambient orbs -->
<div id="orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- top bar -->
<div id="topbar">
  <div id="logo">🎬 MovieRoulette</div>
  <div id="topbar-actions">
    <button class="top-btn" id="wl-top-btn" onclick="openWL()">
      <span>♥</span> Watchlist <span class="badge" id="wl-badge" style="display:none">0</span>
    </button>
  </div>
</div>

<div id="hint">drag to spin</div>

<!-- banner -->
<div id="backdrop" onclick="closeBanner()"></div>
<div id="banner">
  <div id="banner-bg"></div>
  <button id="banner-close" onclick="closeBanner()">✕</button>
  <div id="banner-scroll">
    <div id="banner-inner">
      <div id="banner-top">
        <img id="banner-poster" alt="">
        <div id="banner-info">
          <div id="banner-tag">Tonight's Pick</div>
          <div id="banner-title"></div>
          <div id="banner-meta"></div>
          <div id="banner-stars"></div>
          <div id="banner-genres"></div>
        </div>
      </div>
      <div id="banner-overview"></div>
      <div id="trailer-wrap"><iframe id="trailer-frame" allowfullscreen allow="autoplay;encrypted-media"></iframe></div>
      <div id="banner-btns">
        <button class="bb primary" onclick="closeBanner();spin()">✦ Spin Again</button>
        <button class="bb" id="bb-skip" onclick="closeBanner();skipMovie()">↺ Not this one</button>
        <button class="bb trailer" id="bb-trailer" onclick="toggleTrailer()">▶ Trailer</button>
        <button class="bb" id="bb-tmdb">TMDB ↗</button>
        <button class="bb wl" id="bb-wl" onclick="toggleWL()">♥ Save</button>
      </div>
    </div>
  </div>
</div>

<!-- watchlist -->
<div id="wl-bd" onclick="closeWL()"></div>
<div id="wl-panel">
  <div id="wl-hdr">
    <div style="display:flex;align-items:center">
      <h3>Watchlist</h3>
      <span class="sub" id="wl-sub"></span>
    </div>
    <button id="wl-x" onclick="closeWL()">✕</button>
  </div>
  <div id="wl-list"></div>
</div>

<!-- bottom panel -->
<div id="panel">
  <div class="fs">
    <div class="fl">Genre</div>
    <div class="pr" id="gb">
      <button class="p on" data-id="">All</button>
      <button class="p" data-id="28">Action</button>
      <button class="p" data-id="35">Comedy</button>
      <button class="p" data-id="18">Drama</button>
      <button class="p" data-id="27">Horror</button>
      <button class="p" data-id="878">Sci-Fi</button>
      <button class="p" data-id="53">Thriller</button>
      <button class="p" data-id="10749">Romance</button>
      <button class="p" data-id="16">Animation</button>
      <button class="p" data-id="80">Crime</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const API_KEY="db76c689c142949499b276e42606539a";
const GENRE_MAP={28:"Action",35:"Comedy",18:"Drama",27:"Horror",878:"Sci-Fi",53:"Thriller",10749:"Romance",16:"Animation",80:"Crime",9648:"Mystery",14:"Fantasy",10402:"Music",99:"Documentary",36:"History",10752:"War",37:"Western"};

// filters
let sg="",sl="",sf="",st="";
document.querySelectorAll("#gb .p").forEach(b=>{b.onclick=()=>{document.querySelectorAll("#gb .p").forEach(x=>x.classList.remove("on"));b.classList.add("on");sg=b.dataset.id;}});
document.querySelectorAll("#lb .p").forEach(b=>{b.onclick=()=>{document.querySelectorAll("#lb .p").forEach(x=>x.classList.remove("on"));b.classList.add("on");sl=b.dataset.lang;}});
document.querySelectorAll("#db .p").forEach(b=>{b.onclick=()=>{document.querySelectorAll("#db .p").forEach(x=>x.classList.remove("on"));b.classList.add("on");sf=b.dataset.from;st=b.dataset.to;}});
const rs=document.getElementById("rslider"),rv=document.getElementById("rval");
rs.oninput=()=>rv.textContent=parseFloat(rs.value).toFixed(1)+"+";

// THREE.JS
const canvas=document.getElementById("cv");
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x05050a,1);
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x05050a,0.025);
const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,300);
camera.position.set(0,2.5,13);camera.lookAt(0,0,0);
window.addEventListener("resize",()=>{renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();});
renderer.setSize(innerWidth,innerHeight);
scene.add(new THREE.AmbientLight(0xffffff,0.18));
const kL=new THREE.PointLight(0x6644ff,3.5,38);kL.position.set(-6,10,6);scene.add(kL);
const rL=new THREE.PointLight(0xff4466,2.2,30);rL.position.set(6,6,-8);scene.add(rL);
const fL=new THREE.PointLight(0x44ffcc,1.2,22);fL.position.set(0,-4,10);scene.add(fL);
const dL=new THREE.DirectionalLight(0xffffff,0.5);dL.position.set(0,12,5);scene.add(dL);
const floor=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshStandardMaterial({color:0x040408,roughness:0.25,metalness:0.75}));
floor.rotation.x=-Math.PI/2;floor.position.y=-1.06;scene.add(floor);
const PAL=[["#160a2e","#4a1090"],["#0a1630","#1048b0"],["#2e0a08","#a02810"],["#0a2e14","#10a045"],["#2e280a","#a09008"],["#18182e","#5050c0"],["#2e0a18","#a01048"],["#0a2e2e","#10a0a0"],["#1e080e","#802838"]];
function mct(p){const c=document.createElement("canvas");c.width=256;c.height=384;const ctx=c.getContext("2d");const g=ctx.createLinearGradient(0,0,256,384);g.addColorStop(0,p[0]);g.addColorStop(1,p[1]);ctx.fillStyle=g;ctx.fillRect(0,0,256,384);ctx.fillStyle="rgba(0,0,0,0.45)";for(let i=0;i<8;i++)ctx.fillRect(8+i*30,8,18,14);ctx.fillStyle="rgba(255,255,255,0.025)";for(let y=0;y<384;y+=4)ctx.fillRect(0,y,256,2);ctx.strokeStyle="rgba(255,255,255,0.08)";ctx.lineWidth=1;ctx.strokeRect(20,36,216,280);ctx.beginPath();ctx.moveTo(20,36);ctx.lineTo(236,316);ctx.moveTo(236,36);ctx.lineTo(20,316);ctx.stroke();ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,330,256,54);return new THREE.CanvasTexture(c);}
const TOTAL=48,RADIUS=8,cards=[];
for(let i=0;i<TOTAL;i++){const a=(i/TOTAL)*Math.PI*2,p=PAL[i%PAL.length];const mats=[new THREE.MeshStandardMaterial({color:0x181828,roughness:0.7,metalness:0.5}),new THREE.MeshStandardMaterial({color:0x181828,roughness:0.7,metalness:0.5}),new THREE.MeshStandardMaterial({color:0x181828,roughness:0.7,metalness:0.5}),new THREE.MeshStandardMaterial({color:0x181828,roughness:0.7,metalness:0.5}),new THREE.MeshStandardMaterial({map:mct(p),roughness:0.4,metalness:0.3}),new THREE.MeshStandardMaterial({color:0x0c0c18,roughness:0.9,metalness:0.1})];const mesh=new THREE.Mesh(new THREE.BoxGeometry(1.5,2.25,0.07),mats);mesh.position.set(Math.cos(a)*RADIUS,0,Math.sin(a)*RADIUS);mesh.rotation.y=-a+Math.PI/2;mesh.userData={baseAngle:a};scene.add(mesh);cards.push(mesh);}
const pGeo=new THREE.BufferGeometry(),pPos=new Float32Array(400*3);
for(let i=0;i<400;i++){pPos[i*3]=(Math.random()-0.5)*50;pPos[i*3+1]=(Math.random()-0.5)*25;pPos[i*3+2]=(Math.random()-0.5)*50;}
pGeo.setAttribute("position",new THREE.BufferAttribute(pPos,3));
scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x9988dd,size:0.055,transparent:true,opacity:0.4})));

let rotY=0,autoSpin=true,isDragging=false,lastX=0,vel=0,highlighted=-1;
canvas.addEventListener("mousedown",e=>{isDragging=true;lastX=e.clientX;autoSpin=false;vel=0;});
window.addEventListener("mouseup",()=>{isDragging=false;});
window.addEventListener("mousemove",e=>{if(!isDragging)return;const dx=e.clientX-lastX;vel=dx*0.002;rotY+=dx*0.003;lastX=e.clientX;});
canvas.addEventListener("touchstart",e=>{isDragging=true;lastX=e.touches[0].clientX;autoSpin=false;},{passive:true});
window.addEventListener("touchend",()=>{isDragging=false;});
window.addEventListener("touchmove",e=>{if(!isDragging)return;const dx=e.touches[0].clientX-lastX;vel=dx*0.002;rotY+=dx*0.003;lastX=e.touches[0].clientX;},{passive:true});

let spinAnim=false,spinS=0,spinT=0,spinST=0;
const SD=2600;
function eio(t){return t<0.5?16*t*t*t*t*t:1-Math.pow(-2*t+2,5)/2;}

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  if(spinAnim){const p=Math.min((now-spinST)/SD,1);rotY=spinS+eio(p)*(spinT-spinS);if(p>=1)spinAnim=false;}
  else if(autoSpin){rotY+=0.004;}
  else if(!isDragging&&Math.abs(vel)>0.0004){rotY+=vel;vel*=0.94;}
  cards.forEach((c,i)=>{
    const a=c.userData.baseAngle+rotY;
    c.position.x=Math.cos(a)*RADIUS;c.position.z=Math.sin(a)*RADIUS;c.rotation.y=-a+Math.PI/2;
    const h=i===highlighted;
    c.position.y+=((h?0.55:0)-c.position.y)*0.1;
    c.scale.setScalar(c.scale.x+((h?1.12:1)-c.scale.x)*0.1);
    if(h){c.material[4].emissive=new THREE.Color(0x664422);c.material[4].emissiveIntensity=0.5;}
    else{c.material[4].emissiveIntensity=0;}
  });
  kL.position.x=Math.sin(now*0.0007)*9;
  rL.position.z=Math.cos(now*0.0005)*9-6;
  fL.position.x=Math.sin(now*0.0011)*6;
  renderer.render(scene,camera);
}
animate();

// fetch
let isFetching=false,currentMovie=null,currentId=null,currentTitle="";
let lastResults=[],lastIdx=0;

async function fetchMovies(){
  const page=Math.floor(Math.random()*12)+1;
  let rating=parseFloat(rs.value);
  async function tf(r){
    let url=`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&vote_count.gte=50&vote_average.gte=${r}&page=${page}&language=en-US`;
    if(sg)url+=`&with_genres=${sg}`;
    if(sl)url+=`&with_original_language=${sl}`;
    if(sf)url+=`&primary_release_date.gte=${sf}-01-01`;
    if(st)url+=`&primary_release_date.lte=${st}-12-31`;
    const res=await fetch(url);return await res.json();
  }
  let d=await tf(rating);
  while((!d.results||d.results.length===0)&&rating>5){rating=Math.max(rating-1,5);d=await tf(rating);}
  if(!d.results||d.results.length===0)return null;
  document.getElementById("count-lbl").textContent=rating<parseFloat(rs.value)?`Showing ${rating}+ (loosened)`:`${(d.total_results||0).toLocaleString()} movies`;
  lastResults=d.results;lastIdx=Math.floor(Math.random()*lastResults.length);
  return lastResults[lastIdx];
}

async function spin(){
  if(isFetching)return;
  isFetching=true;
  closeBanner();
  const btn=document.getElementById("spin-btn");
  btn.disabled=true;btn.classList.add("spinning");
  document.getElementById("skip-btn").style.display="none";
  document.getElementById("movie-title").textContent="Finding your movie…";
  document.getElementById("movie-meta").textContent="";
  highlighted=-1;
  const movie=await fetchMovies().catch(()=>null);
  currentMovie=movie;
  const ci=Math.floor(Math.random()*TOTAL);
  spinS=rotY;spinT=rotY+Math.PI*2*5-((rotY)%(Math.PI*2));
  spinST=performance.now();spinAnim=true;autoSpin=false;
  setTimeout(()=>{
    highlighted=ci;btn.classList.remove("spinning");
    if(movie){
      const y=movie.release_date?movie.release_date.slice(0,4):"";
      document.getElementById("movie-title").textContent=movie.title;
      document.getElementById("movie-meta").textContent=(y||"")+(movie.vote_average?" · ★ "+movie.vote_average.toFixed(1):"");
      document.getElementById("skip-btn").style.display="flex";
      setTimeout(()=>showBanner(movie),350);
    }else{
      document.getElementById("movie-title").textContent="No movies found";
      document.getElementById("movie-meta").textContent="Try different filters";
    }
    isFetching=false;btn.disabled=false;
  },SD+100);
}

async function skipMovie(){
  if(isFetching)return;
  closeBanner();
  if(lastResults.length>1){
    lastIdx=(lastIdx+1)%lastResults.length;
    const m=lastResults[lastIdx];currentMovie=m;
    const y=m.release_date?m.release_date.slice(0,4):"";
    document.getElementById("movie-title").textContent=m.title;
    document.getElementById("movie-meta").textContent=(y||"")+(m.vote_average?" · ★ "+m.vote_average.toFixed(1):"");
    setTimeout(()=>showBanner(m),200);
  }else{spin();}
}

// banner
let trailerOpen=false;
function showBanner(movie){
  const y=movie.release_date?movie.release_date.slice(0,4):"";
  currentId=movie.id;currentTitle=movie.title;
  document.getElementById("banner-title").textContent=movie.title;
  document.getElementById("banner-overview").textContent=movie.overview||"";
  document.getElementById("banner-meta").innerHTML=[y,movie.vote_average?`<b style="color:var(--gold)">★ ${movie.vote_average.toFixed(1)}</b>`:null].filter(Boolean).join("&nbsp;&nbsp;·&nbsp;&nbsp;");
  const se=document.getElementById("banner-stars");
  if(movie.vote_average){const f=Math.round(movie.vote_average/2);se.innerHTML=Array.from({length:5},(_,i)=>`<span class="star ${i<f?'filled':'empty'}">${i<f?"★":"☆"}</span>`).join("")+`<span id="banner-vote">${movie.vote_count?movie.vote_count.toLocaleString()+" votes":""}</span>`;}
  else se.innerHTML="";
  const ge=document.getElementById("banner-genres");
  ge.innerHTML=(movie.genre_ids||[]).slice(0,4).map(id=>GENRE_MAP[id]?`<span class="gtag">${GENRE_MAP[id]}</span>`:"").join("");
  const pu=movie.poster_path?`https://image.tmdb.org/t/p/w342${movie.poster_path}`:"";
  document.getElementById("banner-poster").src=pu;
  document.getElementById("banner-bg").style.backgroundImage=pu?`url(${pu})`:"";
  trailerOpen=false;
  document.getElementById("trailer-wrap").style.display="none";
  document.getElementById("trailer-frame").src="";
  document.getElementById("bb-trailer").textContent="▶ Trailer";
  document.getElementById("bb-tmdb").onclick=()=>window.open(`https://www.themoviedb.org/movie/${movie.id}`,"_blank");
  updateWLBtn(movie.id);
  const bd=document.getElementById("backdrop"),bn=document.getElementById("banner");
  bd.classList.add("open");bn.style.display="block";
  requestAnimationFrame(()=>requestAnimationFrame(()=>bn.classList.add("open")));
}

function closeBanner(){
  const bd=document.getElementById("backdrop"),bn=document.getElementById("banner");
  bn.classList.remove("open");bd.classList.remove("open");
  setTimeout(()=>{bn.style.display="none";document.getElementById("trailer-frame").src="";},380);
  trailerOpen=false;
}

async function toggleTrailer(){
  if(trailerOpen){
    document.getElementById("trailer-wrap").style.display="none";
    document.getElementById("trailer-frame").src="";
    document.getElementById("bb-trailer").textContent="▶ Trailer";
    trailerOpen=false;return;
  }
  document.getElementById("bb-trailer").textContent="Loading…";
  try{
    const r=await fetch(`https://api.themoviedb.org/3/movie/${currentId}/videos?api_key=${API_KEY}`);
    const d=await r.json();
    const t=d.results?.find(v=>v.type==="Trailer"&&v.site==="YouTube")||d.results?.find(v=>v.site==="YouTube");
    if(t){document.getElementById("trailer-frame").src=`https://www.youtube.com/embed/${t.key}?autoplay=1`;document.getElementById("trailer-wrap").style.display="block";document.getElementById("bb-trailer").textContent="✕ Close";trailerOpen=true;}
    else{window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(currentTitle+" trailer")}`,"_blank");document.getElementById("bb-trailer").textContent="▶ Trailer";}
  }catch(e){window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(currentTitle+" trailer")}`,"_blank");document.getElementById("bb-trailer").textContent="▶ Trailer";}
}

// watchlist
function getWL(){try{return JSON.parse(localStorage.getItem("mr_wl")||"[]");}catch{return[];}}
function saveWL(l){localStorage.setItem("mr_wl",JSON.stringify(l));updateWLCount();}
function toggleWL(){
  if(!currentMovie)return;
  let l=getWL();const idx=l.findIndex(m=>m.id===currentMovie.id);
  if(idx>-1)l.splice(idx,1);
  else l.unshift({id:currentMovie.id,title:currentMovie.title,poster_path:currentMovie.poster_path,release_date:currentMovie.release_date,vote_average:currentMovie.vote_average});
  saveWL(l);updateWLBtn(currentMovie.id);
}
function updateWLBtn(id){
  const b=document.getElementById("bb-wl"),saved=getWL().some(m=>m.id===id);
  b.textContent=saved?"♥ Saved":"♥ Save";
  saved?b.classList.add("saved"):b.classList.remove("saved");
}
function updateWLCount(){
  const n=getWL().length;
  const badge=document.getElementById("wl-badge");
  const tb=document.getElementById("wl-top-btn");
  badge.textContent=n;badge.style.display=n?"inline-block":"none";
  tb.classList.toggle("glow",n>0);
  document.getElementById("wl-sub").textContent=n?`${n} saved`:"";
}
function openWL(){
  const list=getWL(),el=document.getElementById("wl-list");
  if(!list.length){el.innerHTML='<div id="wl-empty"><div class="icon">♥</div>No movies saved yet.<br>Spin and hit ♥ Save on ones you like.</div>';}
  else{el.innerHTML=list.map(m=>{const y=m.release_date?m.release_date.slice(0,4):"";const p=m.poster_path?`https://image.tmdb.org/t/p/w92${m.poster_path}`:"";return`<div class="wi"><img class="wt" src="${p}" onerror="this.style.background='var(--surface)'" alt=""><div class="wi-info"><div class="wi-name">${m.title}</div><div class="wi-sub">${y}${m.vote_average?" · ★ "+m.vote_average.toFixed(1):""}</div></div><button class="wi-rm" onclick="rmWL(${m.id})">✕</button></div>`;}).join("");}
  document.getElementById("wl-bd").classList.add("open");
  const p=document.getElementById("wl-panel");p.style.display="flex";
  requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add("open")));
}
function rmWL(id){saveWL(getWL().filter(m=>m.id!==id));openWL();if(currentId===id)updateWLBtn(id);}
function closeWL(){
  document.getElementById("wl-bd").classList.remove("open");
  const p=document.getElementById("wl-panel");p.classList.remove("open");
  setTimeout(()=>p.style.display="none",280);
}
updateWLCount();
</script>
